<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subscription Plans — EduSphere</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/analytics.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="particles"></div>
  <div id="app-header"></div>
  <main class="section">
    <div class="container">
      <h1 class="page-title text-center">Subscription Plans</h1>
      <p class="text-center text-muted mb-3">Unlock unlimited learning</p>
      <div class="pricing-grid">
        <div class="card pricing-card"><h3>Free</h3><div class="price">$0<span>/mo</span></div><ul class="pricing-features"><li>5 courses</li><li>Community</li></ul><button class="btn btn-outline" style="width:100%">Current Plan</button></div>
        <div class="card pricing-card featured"><h3>Pro</h3><div class="price">$29<span>/mo</span></div><ul class="pricing-features"><li>Unlimited courses</li><li>AI Tutor</li><li>Certificates</li><li>Live classes</li></ul><button class="btn btn-primary" style="width:100%">Upgrade</button></div>
        <div class="card pricing-card"><h3>Team</h3><div class="price">$79<span>/mo</span></div><ul class="pricing-features"><li>5 seats</li><li>Analytics</li><li>Admin dashboard</li></ul><button class="btn btn-outline" style="width:100%">Contact</button></div>
        <div class="card pricing-card"><h3>Enterprise</h3><div class="price">Custom</div><ul class="pricing-features"><li>Unlimited seats</li><li>SSO</li><li>Custom content</li></ul><button class="btn btn-outline" style="width:100%">Sales</button></div>
      </div>
    </div>
  </main>
  <div id="app-footer"></div>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
