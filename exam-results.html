<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exam Results — EduSphere</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/analytics.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="particles"></div>
  <div id="app-header"></div>
  <div class="dashboard-layout">
    <div id="app-sidebar"></div>
    <main class="dashboard-main">
      <h1 class="page-title">Exam Results & Reports</h1>
      <div id="exam-results-list"></div>
    </main>
  </div>
  <div id="app-footer"></div>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('exam-results-list').innerHTML = EduData.quizzes.slice(0,50).map((q,i) => `
      <div class="card mb-2 flex-between flex-wrap gap-1">
        <div><h4>${q.title}</h4><p class="text-muted">${q.courseName}</p></div>
        <div><strong style="font-size:1.5rem;color:${q.avgScore>=70?'var(--success)':'var(--warning)'}">${Math.floor(60+Math.random()*40)}%</strong>
        <p class="text-muted">${q.questions.length} questions</p></div>
        <a href="quizzes.html?id=${q.id}&mode=take" class="btn btn-sm btn-outline">Retake</a>
      </div>
    `).join('');
  </script>
</body>
</html>
