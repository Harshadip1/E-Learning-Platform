<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard — EduSphere</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/analytics.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body data-page="leaderboard">
  <div class="particles"></div>
  <div id="app-header"></div>
  <div class="dashboard-layout">
    <div id="app-sidebar"></div>
    <main class="dashboard-main">
      <h1 class="page-title">Global Leaderboard</h1>
      <p class="page-subtitle">Top 150 learners ranked by XP</p>
      <div class="card glass">
        <table class="data-table leaderboard-table">
          <thead><tr><th>Rank</th><th>Learner</th><th>XP</th><th>Streak</th><th>Courses</th><th>Badges</th></tr></thead>
          <tbody id="leaderboard-body"></tbody>
        </table>
      </div>
    </main>
  </div>
  <div id="app-footer"></div>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/quizzes.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
