<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Categories — EduSphere</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/courses.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="particles"></div>
  <div id="app-header"></div>
  <div class="dashboard-layout">
    <div id="app-sidebar"></div>
    <main class="dashboard-main">
      <h1 class="page-title">Course Categories</h1>
      <div class="grid-3" id="cat-grid"></div>
      <h3 class="mt-3 mb-2" id="cat-courses-title"></h3>
      <div class="courses-grid" id="cat-courses"></div>
    </main>
  </div>
  <div id="app-footer"></div>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/courses.js"></script>
  <script src="js/app.js"></script>
  <script>
    const cat = new URLSearchParams(location.search).get('category') || EduData.CATEGORIES[0];
    document.getElementById('cat-grid').innerHTML = EduData.CATEGORIES.map((c,i) => `
      <a href="categories.html?category=${encodeURIComponent(c)}" class="card category-card ${c===cat?'active':''}">
        <div class="cat-icon">${['💻','🌐','🤖','💼','📣','🎨','💰','📊','🔐','📱'][i]}</div>
        <h3>${c}</h3>
        <p>${EduData.courses.filter(x=>x.category===c).length} courses</p>
      </a>
    `).join('');
    document.getElementById('cat-courses-title').textContent = cat + ' Courses';
    CourseManager.renderGrid(document.getElementById('cat-courses'), EduData.courses.filter(c=>c.category===cat).slice(0,24));
  </script>
</body>
</html>
