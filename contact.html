<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — EduSphere</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div id="app-header"></div>
  <main class="section">
    <div class="container" style="max-width:600px">
      <h1>Contact Us</h1>
      <form class="card glass mt-3" style="padding:2rem" onsubmit="event.preventDefault();NotificationSystem.toast('Message sent!','success')">
        <div class="form-group"><label>Name</label><input required></div>
        <div class="form-group"><label>Email</label><input type="email" required></div>
        <div class="form-group"><label>Subject</label><select><option>Support</option><option>Sales</option><option>Partnership</option></select></div>
        <div class="form-group"><label>Message</label><textarea rows="5" required></textarea></div>
        <button type="submit" class="btn btn-primary">Send Message</button>
      </form>
    </div>
  </main>
  <div id="app-footer"></div>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
