<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — EduSphere</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/courses.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="particles"></div>
  <div id="app-header"></div>
  <div class="dashboard-layout">
    <div id="app-sidebar"></div>
    <main class="dashboard-main">
      <div class="card glass" style="display:flex;gap:2rem;flex-wrap:wrap;align-items:center;padding:2rem">
        <div class="instructor-avatar" style="width:120px;height:120px;font-size:3rem">L</div>
        <div>
          <h1>Learner Profile</h1>
          <p class="text-muted">Student · Member since 2023</p>
          <div class="flex gap-2 mt-2">
            <span class="tag">45 Courses</span>
            <span class="tag tag-success">28 Completed</span>
            <span class="tag tag-warning">23 Day Streak</span>
          </div>
        </div>
      </div>
      <div class="grid-2 mt-3">
        <div class="card glass">
          <h3>Edit Profile</h3>
          <div class="form-group mt-2"><label>Display Name</label><input value="Learner"></div>
          <div class="form-group"><label>Bio</label><textarea rows="3">Passionate about continuous learning and technology.</textarea></div>
          <button class="btn btn-primary">Save Changes</button>
        </div>
        <div class="card glass">
          <h3>Learning Stats</h3>
          <p class="mt-2">Study hours: <strong>1,247h</strong></p>
          <p>Certificates: <strong>28</strong></p>
          <p>Quiz average: <strong>84%</strong></p>
          <p>XP Points: <strong>48,250</strong></p>
        </div>
      </div>
    </main>
  </div>
  <div id="app-footer"></div>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
