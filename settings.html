<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — EduSphere</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="particles"></div>
  <div id="app-header"></div>
  <div class="dashboard-layout">
    <div id="app-sidebar"></div>
    <main class="dashboard-main">
      <h1 class="page-title">Settings</h1>
      <div class="grid-2">
        <div class="card glass">
          <h3>Appearance</h3>
          <div class="form-group mt-2">
            <label>Theme</label>
            <button class="btn btn-outline" data-theme-toggle>Toggle Dark / Light</button>
          </div>
          <div class="form-group">
            <label>Language</label>
            <select><option>English</option><option>Spanish</option><option>French</option><option>German</option><option>Japanese</option></select>
          </div>
        </div>
        <div class="card glass">
          <h3>Learning Preferences</h3>
          <div class="form-group mt-2">
            <label><input type="checkbox" checked> Email notifications</label>
          </div>
          <div class="form-group">
            <label><input type="checkbox" checked> Autoplay next lesson</label>
          </div>
          <div class="form-group">
            <label>Default playback speed</label>
            <select><option>1x</option><option>1.25x</option><option>1.5x</option></select>
          </div>
        </div>
        <div class="card glass">
          <h3>Keyboard Shortcuts</h3>
          <table class="data-table mt-2">
            <tr><td>Ctrl + K</td><td>Search</td></tr>
            <tr><td>Ctrl + D</td><td>Toggle theme</td></tr>
            <tr><td>Space</td><td>Play / Pause video</td></tr>
          </table>
        </div>
        <div class="card glass">
          <h3>Pomodoro Timer</h3>
          <div class="pomodoro-timer" id="pomodoro">25:00</div>
          <div class="flex gap-2" style="justify-content:center">
            <button class="btn btn-primary btn-sm" id="pomodoro-start">Start</button>
            <button class="btn btn-outline btn-sm" id="pomodoro-reset">Reset</button>
          </div>
        </div>
      </div>
    </main>
  </div>
  <div id="app-footer"></div>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/app.js"></script>
  <script>
    let pomodoroSec = 25 * 60, pomodoroTimer;
    document.getElementById('pomodoro-start')?.addEventListener('click', () => {
      pomodoroTimer = setInterval(() => {
        pomodoroSec--;
        const m = Math.floor(pomodoroSec / 60), s = pomodoroSec % 60;
        document.getElementById('pomodoro').textContent = `${m}:${String(s).padStart(2,'0')}`;
        if (pomodoroSec <= 0) { clearInterval(pomodoroTimer); NotificationSystem?.toast('Break time!','success'); }
      }, 1000);
    });
    document.getElementById('pomodoro-reset')?.addEventListener('click', () => {
      clearInterval(pomodoroTimer); pomodoroSec = 25 * 60;
      document.getElementById('pomodoro').textContent = '25:00';
    });
  </script>
</body>
</html>
