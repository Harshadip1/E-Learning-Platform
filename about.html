<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About — EduSphere</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div id="app-header"></div>
  <main class="section">
    <div class="container" style="max-width:800px">
      <h1>About EduSphere</h1>
      <p class="mt-2 text-muted">EduSphere is an enterprise-grade e-learning platform demo built with HTML5, CSS3, and vanilla JavaScript. It showcases a full online education experience with courses, video lessons, quizzes, analytics, and community features.</p>
      <div class="stats-row mt-3" id="about-stats"></div>
      <div class="vr-preview mt-3">🥽</div>
      <p class="text-center text-muted mt-1">VR Classroom UI Concept</p>
    </div>
  </main>
  <div id="app-footer"></div>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('about-stats').innerHTML = `
      <div class="stat-card card"><div class="stat-value">${EduData.platformStats.totalCourses}+</div><div class="stat-label">Courses</div></div>
      <div class="stat-card card"><div class="stat-value">${EduData.platformStats.totalLessons}+</div><div class="stat-label">Lessons</div></div>
      <div class="stat-card card"><div class="stat-value">${EduData.platformStats.totalQuizzes}+</div><div class="stat-label">Quizzes</div></div>
    `;
  </script>
</body>
</html>
