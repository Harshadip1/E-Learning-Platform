<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Results — EduSphere</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/courses.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body data-page="search">
  <div class="particles"></div>
  <div id="app-header"></div>
  <div class="dashboard-layout">
    <div id="app-sidebar"></div>
    <main class="dashboard-main">
      <h1 class="page-title">Search Results</h1>
      <div class="card glass mb-2" style="padding:1rem">
        <input type="search" id="search-query" placeholder="Search courses, instructors..." style="font-size:1.1rem">
      </div>
      <p class="page-subtitle" id="search-count"></p>
      <div class="courses-grid" id="search-results"></div>
      <div class="pagination" id="search-pagination"></div>
    </main>
  </div>
  <div id="app-footer"></div>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/courses.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
