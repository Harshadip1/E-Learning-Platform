<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Details — EduSphere</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/courses.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body data-page="course-detail">
  <div class="particles"></div>
  <div id="app-header"></div>
  <div class="dashboard-layout">
    <div id="app-sidebar"></div>
    <main class="dashboard-main">
      <div class="course-hero">
        <div>
          <span class="tag" id="course-category">—</span>
          <h1 class="page-title" id="course-title">Loading...</h1>
          <p class="text-muted mt-1" id="course-description"></p>
          <p class="mt-2" id="course-rating"></p>
          <p class="text-muted" id="course-students"></p>
          <p class="mt-1"><span class="tag" id="course-level"></span> · <span id="course-duration"></span></p>
          <p class="mt-2">Instructor: <strong id="course-instructor"></strong></p>
          <div class="mt-3 flex gap-2">
            <a href="lessons.html" class="btn btn-primary btn-lg" id="enroll-btn">Start Learning</a>
            <button class="btn btn-outline">♥ Wishlist</button>
          </div>
        </div>
        <div class="course-hero-preview card" id="course-preview"></div>
      </div>

      <div class="tabs mt-3">
        <button class="tab-btn active" data-tab="curriculum">Curriculum</button>
        <button class="tab-btn" data-tab="reviews">Reviews</button>
        <button class="tab-btn" data-tab="related">Related</button>
      </div>

      <div class="tab-panel active" id="tab-curriculum">
        <div id="curriculum-list"></div>
      </div>
      <div class="tab-panel" id="tab-reviews">
        <div id="course-reviews-list"></div>
      </div>
      <div class="tab-panel" id="tab-related">
        <div class="courses-grid" id="related-courses"></div>
      </div>

      <aside class="card glass mt-3" style="max-width:320px;position:sticky;top:80px">
        <div class="course-price" style="font-size:1.5rem" id="course-price">$49</div>
        <a href="lessons.html" class="btn btn-primary mt-2" style="width:100%">Enroll Now</a>
      </aside>
    </main>
  </div>
  <div id="app-footer"></div>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/courses.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn, .tab-panel').forEach(el => el.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab)?.classList.add('active');
      });
    });
    const id = new URLSearchParams(location.search).get('id');
    document.getElementById('enroll-btn').href = 'lessons.html?course=' + (id || 'course-1');
  </script>
</body>
</html>
