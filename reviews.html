<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Reviews — EduSphere</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/courses.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="particles"></div>
  <div id="app-header"></div>
  <div class="dashboard-layout">
    <div id="app-sidebar"></div>
    <main class="dashboard-main">
      <h1 class="page-title">Course Reviews</h1>
      <p class="page-subtitle">800+ student reviews</p>
      <div id="reviews-list"></div>
    </main>
  </div>
  <div id="app-footer"></div>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('reviews-list').innerHTML = EduData.reviews.slice(0,60).map(r => {
      const course = EduData.getCourseById(r.courseId);
      return `<div class="card review-card"><div class="review-header">
        <div class="review-avatar">${r.author[0]}</div>
        <div><strong>${r.author}</strong><div class="rating">${Utils.stars(r.rating)}</div>
        <small class="text-muted">${course?.title || 'Course'} · ${r.date}</small></div>
      </div><p>${r.text}</p><small>👍 ${r.helpful} helpful</small></div>`;
    }).join('');
  </script>
</body>
</html>
