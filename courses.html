<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Marketplace — EduSphere</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/courses.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body data-page="courses">
  <div class="particles"></div>
  <div id="app-header"></div>
  <div class="dashboard-layout">
    <div id="app-sidebar"></div>
    <main class="dashboard-main">
      <h1 class="page-title">Course Marketplace</h1>
      <p class="page-subtitle" id="course-count">Loading courses...</p>

      <div class="card glass filters-panel">
        <div class="filters-row">
          <div class="filter-group" style="flex:1;min-width:200px">
            <label>Search</label>
            <input type="search" id="course-search" placeholder="Search 320+ courses...">
          </div>
          <div class="filter-group">
            <label>Category</label>
            <select id="filter-category">
              <option value="">All Categories</option>
              <option>Programming</option>
              <option>Web Development</option>
              <option>AI & Machine Learning</option>
              <option>Business</option>
              <option>Marketing</option>
              <option>Design</option>
              <option>Finance</option>
              <option>Data Science</option>
              <option>Cybersecurity</option>
              <option>Mobile Development</option>
            </select>
          </div>
          <div class="filter-group">
            <label>Level</label>
            <select id="filter-level">
              <option value="">All Levels</option>
              <option>Beginner</option>
              <option>Intermediate</option>
              <option>Advanced</option>
              <option>Expert</option>
            </select>
          </div>
          <div class="filter-group">
            <label>Sort</label>
            <select id="filter-sort">
              <option value="">Popular</option>
              <option value="rating">Highest Rated</option>
              <option value="students">Most Students</option>
              <option value="price-low">Price: Low to High</option>
              <option value="price-high">Price: High to Low</option>
            </select>
          </div>
        </div>
        <div class="filter-chips">
          <span class="chip active" data-category="">All</span>
          <span class="chip" data-category="Programming">Programming</span>
          <span class="chip" data-category="Web Development">Web Dev</span>
          <span class="chip" data-category="AI & Machine Learning">AI/ML</span>
          <span class="chip" data-category="Data Science">Data Science</span>
          <span class="chip" data-category="Cybersecurity">Security</span>
          <span class="chip" data-category="Design">Design</span>
          <span class="chip" data-category="Business">Business</span>
        </div>
      </div>

      <div class="courses-grid" id="courses-grid"></div>
      <div class="pagination" id="courses-pagination"></div>
    </main>
  </div>
  <div id="app-footer"></div>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/courses.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
