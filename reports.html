<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports & Export — EduSphere</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="particles"></div>
  <div id="app-header"></div>
  <div class="dashboard-layout">
    <div id="app-sidebar"></div>
    <main class="dashboard-main">
      <h1 class="page-title">Reports & Export</h1>
      <div class="grid-3">
        <div class="card glass"><h3>📊 Progress Report</h3><p class="text-muted mt-1">Full learning progress PDF</p><button class="btn btn-primary btn-sm mt-2" onclick="NotificationSystem.toast('Export started','success')">Export PDF</button></div>
        <div class="card glass"><h3>✅ Quiz Report</h3><p class="text-muted mt-1">All quiz scores CSV</p><button class="btn btn-primary btn-sm mt-2" onclick="NotificationSystem.toast('CSV downloaded','success')">Export CSV</button></div>
        <div class="card glass"><h3>🏆 Certificates</h3><p class="text-muted mt-1">Certificate bundle ZIP</p><button class="btn btn-primary btn-sm mt-2" onclick="NotificationSystem.toast('ZIP ready','success')">Download ZIP</button></div>
      </div>
      <div class="card glass mt-3">
        <h3>Report History</h3>
        <table class="data-table mt-2">
          <thead><tr><th>Report</th><th>Date</th><th>Format</th><th>Action</th></tr></thead>
          <tbody id="report-history"></tbody>
        </table>
      </div>
    </main>
  </div>
  <div id="app-footer"></div>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('report-history').innerHTML = Array.from({length:20}, (_,i) => `
      <tr><td>Learning Report #${i+1}</td><td>2024-05-${String(26-i%20).padStart(2,'0')}</td><td>${['PDF','CSV','ZIP'][i%3]}</td><td><button class="btn btn-sm btn-outline">Download</button></td></tr>
    `).join('');
  </script>
</body>
</html>
