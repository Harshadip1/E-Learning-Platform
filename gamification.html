<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gamification — EduSphere</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/analytics.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body data-page="gamification">
  <div class="particles"></div>
  <div id="app-header"></div>
  <div class="dashboard-layout">
    <div id="app-sidebar"></div>
    <main class="dashboard-main">
      <h1 class="page-title">Gamification Dashboard</h1>
      <div class="stats-row">
        <div class="stat-card card"><div class="stat-value">48,250</div><div class="stat-label">Total XP</div></div>
        <div class="stat-card card"><div class="stat-value">23</div><div class="stat-label">Day Streak</div></div>
        <div class="stat-card card"><div class="stat-value">18</div><div class="stat-label">Badges</div></div>
        <div class="stat-card card"><div class="stat-value">#142</div><div class="stat-label">Global Rank</div></div>
      </div>
      <p class="mb-1">Level 24 — 2,450 / 5,000 XP to next level</p>
      <div class="xp-bar"><div class="xp-bar-fill" style="width:49%"></div></div>
      <h3 class="mt-3 mb-2">Daily Challenges</h3>
      <div class="grid-3" id="daily-challenges"></div>
      <h3 class="mt-3 mb-2">Leaderboard</h3>
      <div class="card glass">
        <table class="data-table leaderboard-table">
          <thead><tr><th>Rank</th><th>Learner</th><th>XP</th><th>Streak</th></tr></thead>
          <tbody id="gamification-leaderboard"></tbody>
        </table>
      </div>
    </main>
  </div>
  <div id="app-footer"></div>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/quizzes.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
