<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instructor Dashboard — EduSphere</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/analytics.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body data-page="instructor-dashboard">
  <div class="particles"></div>
  <div id="app-header"></div>
  <div class="dashboard-layout">
    <div id="app-sidebar"></div>
    <main class="dashboard-main">
      <h1 class="page-title">Instructor Dashboard</h1>
      <div class="stats-row" id="instructor-stats"></div>
      <div class="dashboard-grid mt-3">
        <div class="card glass">
          <h3>Revenue Overview</h3>
          <div class="chart-container"><canvas id="chart-weekly"></canvas></div>
        </div>
        <div class="card glass">
          <h3>Recent Students</h3>
          <table class="data-table">
            <thead><tr><th>Name</th><th>Progress</th><th>XP</th><th>Status</th></tr></thead>
            <tbody id="instructor-students"></tbody>
          </table>
        </div>
      </div>
      <div class="card glass mt-3">
        <h3>Course Management</h3>
        <table class="data-table mt-2">
          <thead><tr><th>Course</th><th>Students</th><th>Rating</th><th>Revenue</th></tr></thead>
          <tbody id="instructor-courses"></tbody>
        </table>
      </div>
    </main>
  </div>
  <div id="app-footer"></div>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/analytics.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const tbody = document.getElementById('instructor-courses');
      if (tbody) tbody.innerHTML = EduData.courses.slice(0,15).map(c => `
        <tr><td>${c.title}</td><td>${Utils.formatNumber(c.students)}</td><td>${c.rating}</td><td>$${Math.floor(c.students * c.price * 0.1)}</td></tr>
      `).join('');
    });
  </script>
</body>
</html>
