<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile Learning — EduSphere</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="particles"></div>
  <div id="app-header"></div>
  <main class="section">
    <div class="container text-center">
      <h1 class="page-title">Mobile Learning UI</h1>
      <p class="text-muted mb-3">Optimized experience for phones and tablets</p>
      <div class="mobile-preview">
        <div class="mobile-header"><h3>EduSphere</h3><p>Continue learning</p></div>
        <div class="mobile-content" id="mobile-courses"></div>
      </div>
    </div>
  </main>
  <div id="app-footer"></div>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('mobile-courses').innerHTML = EduData.enrolledCourses.slice(0,5).map(c => `
      <div class="card mb-2" style="padding:0.75rem"><strong>${c.title}</strong>
      <div class="progress-bar mt-1"><div class="progress-bar-fill" style="width:${c.progress}%"></div></div></div>
    `).join('');
  </script>
</body>
</html>
