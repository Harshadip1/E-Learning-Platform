<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Groups — EduSphere</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="particles"></div>
  <div id="app-header"></div>
  <div class="dashboard-layout">
    <div id="app-sidebar"></div>
    <main class="dashboard-main">
      <h1 class="page-title">Study Groups</h1>
      <p class="page-subtitle">50 active study groups</p>
      <div class="grid-3" id="study-groups"></div>
    </main>
  </div>
  <div id="app-footer"></div>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('study-groups').innerHTML = EduData.studyGroups.map(g => `
      <div class="card"><h3>${g.name}</h3><p class="text-muted">${g.topic}</p><p class="mt-1">${g.members} members</p><p class="text-muted">${g.nextMeet}</p><button class="btn btn-primary btn-sm mt-2">Join Group</button></div>
    `).join('');
  </script>
</body>
</html>
