<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quizzes & Exams — EduSphere</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/analytics.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body data-page="quizzes">
  <div class="particles"></div>
  <div id="app-header"></div>
  <div class="dashboard-layout">
    <div id="app-sidebar"></div>
    <main class="dashboard-main">
      <div id="quiz-list-view">
        <h1 class="page-title">Quizzes & Exams</h1>
        <p class="page-subtitle">180+ assessments across all course categories</p>
        <div id="quiz-list"></div>
      </div>
      <div id="quiz-take-view" class="hidden">
        <div class="quiz-header">
          <h1 id="quiz-title">Quiz</h1>
          <div class="quiz-timer" id="quiz-timer">30:00</div>
        </div>
        <div class="quiz-container" id="quiz-container"></div>
      </div>
    </main>
  </div>
  <div id="app-footer"></div>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/quizzes.js"></script>
  <script src="js/app.js"></script>
  <script>
    if (new URLSearchParams(location.search).get('mode') === 'take') {
      document.getElementById('quiz-list-view').classList.add('hidden');
      document.getElementById('quiz-take-view').classList.remove('hidden');
    }
  </script>
</body>
</html>
