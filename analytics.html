<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics — EduSphere</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/analytics.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body data-page="analytics">
  <div class="particles"></div>
  <div id="app-header"></div>
  <div class="dashboard-layout">
    <div id="app-sidebar"></div>
    <main class="dashboard-main">
      <h1 class="page-title">Learning Analytics</h1>
      <p class="page-subtitle">Comprehensive performance insights and reports</p>

      <div class="stats-row">
        <div class="stat-card card"><div class="stat-value" id="stat-study-hours">—</div><div class="stat-label">Total Study Hours</div></div>
        <div class="stat-card card"><div class="stat-value" id="stat-streak">—</div><div class="stat-label">Current Streak</div></div>
        <div class="stat-card card"><div class="stat-value" id="stat-quiz-avg">—</div><div class="stat-label">Avg Quiz Score</div></div>
        <div class="stat-card card"><div class="stat-value" id="stat-completed">—</div><div class="stat-label">Courses Done</div></div>
      </div>

      <div class="dashboard-grid-3">
        <div class="card glass"><h3>Weekly Study Hours</h3><div class="chart-container"><canvas id="chart-weekly"></canvas></div></div>
        <div class="card glass"><h3>Monthly Trend</h3><div class="chart-container"><canvas id="chart-monthly"></canvas></div></div>
        <div class="card glass"><h3>Course Completion</h3><div class="chart-container"><canvas id="chart-completion"></canvas></div><div id="chart-completion-legend"></div></div>
      </div>

      <div class="widget-row mt-3">
        <div class="card glass" style="flex:2"><h3>Quiz Scores</h3><div class="chart-container"><canvas id="chart-quiz"></canvas></div></div>
        <div class="card glass"><h3>Skill Progress</h3><div id="skill-progress-bars" class="mt-2"></div></div>
      </div>

      <div class="card glass mt-3">
        <h3>Study Activity Heatmap</h3>
        <p class="text-muted mb-2">365-day learning activity</p>
        <div class="heatmap-grid" id="study-heatmap"></div>
      </div>
    </main>
  </div>
  <div id="app-footer"></div>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/analytics.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
