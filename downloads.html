<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline Downloads — EduSphere</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/courses.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="particles"></div>
  <div id="app-header"></div>
  <div class="dashboard-layout">
    <div id="app-sidebar"></div>
    <main class="dashboard-main">
      <h1 class="page-title">Downloads & Offline Courses</h1>
      <p class="page-subtitle">Learn without internet connection</p>
      <div id="downloads-list"></div>
    </main>
  </div>
  <div id="app-footer"></div>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('downloads-list').innerHTML = EduData.enrolledCourses.slice(0,20).map(c => `
      <div class="course-list-item card" style="margin-bottom:0.75rem">
        <div class="course-thumb-sm"></div>
        <div class="info"><h4>${c.title}</h4><p class="text-muted">${c.lessonCount} lessons · 1.2 GB</p></div>
        <span class="tag tag-success">Downloaded</span>
      </div>
    `).join('');
  </script>
</body>
</html>
