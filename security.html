<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Security Center — EduSphere</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/analytics.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="particles"></div>
  <div id="app-header"></div>
  <div class="dashboard-layout">
    <div id="app-sidebar"></div>
    <main class="dashboard-main">
      <h1 class="page-title">Security Center</h1>
      <div class="security-alert">⚠️ New login detected from Windows device — 2 hours ago</div>
      <div class="grid-2">
        <div class="card glass">
          <h3>Active Sessions</h3>
          <div class="device-row"><span>💻 Windows — Chrome</span><button class="btn btn-sm btn-outline">Revoke</button></div>
          <div class="device-row"><span>📱 Mobile — Safari</span><button class="btn btn-sm btn-outline">Revoke</button></div>
        </div>
        <div class="card glass">
          <h3>Privacy Settings</h3>
          <div class="form-group mt-2"><label><input type="checkbox" checked> Profile visible to community</label></div>
          <div class="form-group"><label><input type="checkbox"> Share learning progress</label></div>
          <div class="form-group"><label><input type="checkbox" checked> Two-factor authentication</label></div>
        </div>
      </div>
      <div class="card glass mt-3">
        <h3>Login Activity</h3>
        <table class="data-table mt-2">
          <thead><tr><th>Date</th><th>Device</th><th>Location</th><th>Status</th></tr></thead>
          <tbody id="login-activity"></tbody>
        </table>
      </div>
    </main>
  </div>
  <div id="app-footer"></div>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('login-activity').innerHTML = Array.from({length:25}, (_,i) => `
      <tr><td>2024-05-${String(26-i%20).padStart(2,'0')}</td><td>${['Windows','Mac','iOS','Android'][i%4]} — Browser</td><td>Region ${i%5+1}</td><td><span class="tag tag-success">Success</span></td></tr>
    `).join('');
  </script>
</body>
</html>
